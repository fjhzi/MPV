{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header bg-transparent py-3">
    <h1 class="h4 mb-0">Formular</h1>
  </div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data" class="row g-3">
      {% csrf_token %}
      {% for field in form %}
        <div class="col-12">
          <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
          {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
        </div>
      {% endfor %}
      <div class="col-12 d-flex gap-2 justify-content-end">
        <a class="btn btn-cancel" href="/" aria-label="Abbrechen" title="Abbrechen"><i class="fa-solid fa-ban" aria-hidden="true"></i></a>
        <button class="btn btn-save px-4" type="submit" aria-label="Speichern" title="Speichern"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i></button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
