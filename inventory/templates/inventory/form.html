{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="h4 mb-3">Formular</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Speichern</button>
      <a class="btn btn-outline-secondary" href="/">Abbrechen</a>
    </form>
  </div>
</div>
{% endblock %}
