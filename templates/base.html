<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --mpv-bg: #f4f7fb;
      --mpv-text: #111827;
      --mpv-surface: #ffffff;
      --mpv-border: #dbe3ee;
      --mpv-nav-start: #3a66ff;
      --mpv-nav-end: #6a4dff;
      --mpv-link: #3156db;
      --mpv-muted: #5b6472;
      --row-overdue: #f4d9df;
      --row-warning: #f7efd1;
      --toggle-track: #d6ddf0;
      --toggle-knob: #ffffff;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --mpv-bg: #0f1724;
      --mpv-text: #e5ebf7;
      --mpv-surface: #1b2435;
      --mpv-border: #2c3a52;
      --mpv-nav-start: #171f2f;
      --mpv-nav-end: #232f45;
      --mpv-link: #9ab5ff;
      --mpv-muted: #afbdd6;
      --row-overdue: rgba(231, 108, 135, 0.26);
      --row-warning: rgba(226, 192, 95, 0.24);
      --toggle-track: #3a4d70;
      --toggle-knob: #f9f3c4;
    }

    body {
      background: var(--mpv-bg);
      color: var(--mpv-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .navbar-modern {
      background: linear-gradient(135deg, var(--mpv-nav-start), var(--mpv-nav-end));
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.25);
    }

    .navbar-modern .nav-link,
    .navbar-modern .navbar-brand {
      color: #ffffff;
      opacity: 0.92;
      transition: opacity 0.2s ease;
    }

    .navbar-modern .nav-link:hover,
    .navbar-modern .navbar-brand:hover,
    .navbar-modern .nav-link:focus {
      color: #ffffff;
      opacity: 1;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-toggle .track {
      position: relative;
      width: 64px;
      height: 32px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7cb9ff 0%, #4f8df3 100%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
      display: block;
    }

    .theme-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(17, 24, 39, 0.28);
      transition: transform 0.28s cubic-bezier(.4, 0, .2, 1), background-color 0.25s ease;
      z-index: 2;
    }

    .theme-toggle .icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      line-height: 1;
      transition: opacity 0.25s ease;
      z-index: 1;
    }

    .theme-toggle .icon-sun {
      right: 9px;
      opacity: 1;
      color: #ffe082;
      text-shadow: 0 0 8px rgba(255, 224, 130, 0.8);
    }

    .theme-toggle .icon-moon {
      left: 9px;
      opacity: 0;
      color: #dbe7ff;
      text-shadow: 0 0 8px rgba(219, 231, 255, 0.5);
    }

    .theme-toggle input:checked + .track {
      background: linear-gradient(135deg, #1b2538 0%, #0f1727 100%);
      border-color: rgba(170, 188, 220, 0.35);
    }

    .theme-toggle input:checked + .track .thumb {
      transform: translateX(32px);
      background: #e8eeff;
    }

    .theme-toggle input:checked + .track .icon-sun {
      opacity: 0;
    }

    .theme-toggle input:checked + .track .icon-moon {
      opacity: 1;
    }

    .theme-toggle input:focus-visible + .track {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
    }

    .card,
    .table-responsive,
    .modal-content,
    .list-group-item,
    .form-control,
    .form-select,
    .btn-outline-primary,
    .table,
    .bg-white,
    .border,
    .card-body,
    .card-header {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text);
    }

    .table {
      --bs-table-bg: var(--mpv-surface);
      --bs-table-color: var(--mpv-text);
      --bs-table-border-color: var(--mpv-border);
      --bs-table-hover-bg: color-mix(in srgb, var(--mpv-surface) 88%, #6f89ff 12%);
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #ffffff 10%);
    }

    a,
    .btn-link,
    .table a {
      color: var(--mpv-link);
    }

    .text-muted {
      color: var(--mpv-muted) !important;
    }

    .row-overdue { background-color: var(--row-overdue); }
    .row-warning { background-color: var(--row-warning); }

    .table td.reminder-due-overdue {
      background-color: var(--row-overdue) !important;
    }

    .table td.reminder-due-warning {
      background-color: var(--row-warning) !important;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-modern mb-4">
  <div class="container d-flex align-items-center gap-3">
    <a class="navbar-brand fw-semibold" href="/">MPV</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/stammdaten/">Stammdaten</a>
      <a class="nav-link" href="/reminders/">Reminder</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>

    <label class="theme-toggle mb-0" for="theme-switch">
      <input type="checkbox" id="theme-switch" aria-label="Dark Mode umschalten">
      <span class="track">
        <span class="icon icon-moon" aria-hidden="true">☾</span>
        <span class="icon icon-sun" aria-hidden="true">☀</span>
        <span class="thumb"></span>
      </span>
    </label>
  </div>
</nav>
<main class="container py-2 pb-4">
  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-switch');
    const key = 'mpv-theme';

    const getInitialTheme = () => {
      const saved = localStorage.getItem(key);
      if (saved === 'dark' || saved === 'light') {
        return saved;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const applyTheme = (theme) => {
      root.setAttribute('data-theme', theme);
      toggle.checked = theme === 'dark';
    };

    applyTheme(getInitialTheme());

    toggle.addEventListener('change', function () {
      const nextTheme = toggle.checked ? 'dark' : 'light';
      applyTheme(nextTheme);
      localStorage.setItem(key, nextTheme);
    });
  })();
</script>
</body>
</html>
