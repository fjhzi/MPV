<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --mpv-bg: #f4f7fb;
      --mpv-text: #111827;
      --mpv-surface: #ffffff;
      --mpv-border: #dbe3ee;
      --mpv-nav-start: #3a66ff;
      --mpv-nav-end: #6a4dff;
      --mpv-link: #3156db;
      --mpv-muted: #5b6472;
      --row-overdue: #f4d9df;
      --row-warning: #f7efd1;
      --toggle-track: #d6ddf0;
      --toggle-knob: #ffffff;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --mpv-bg: #0f1724;
      --mpv-text: #e5ebf7;
      --mpv-surface: #1b2435;
      --mpv-border: #2c3a52;
      --mpv-nav-start: #171f2f;
      --mpv-nav-end: #232f45;
      --mpv-link: #9ab5ff;
      --mpv-muted: #afbdd6;
      --row-overdue: rgba(231, 108, 135, 0.26);
      --row-warning: rgba(226, 192, 95, 0.24);
      --toggle-track: #3a4d70;
      --toggle-knob: #f9f3c4;
    }

    body {
      background: var(--mpv-bg);
      color: var(--mpv-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .navbar-modern {
      background: linear-gradient(135deg, var(--mpv-nav-start), var(--mpv-nav-end));
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.25);
    }

    .navbar-modern .nav-link,
    .navbar-modern .navbar-brand {
      color: #ffffff;
      opacity: 0.92;
      transition: opacity 0.2s ease;
    }

    .navbar-modern .nav-link:hover,
    .navbar-modern .navbar-brand:hover,
    .navbar-modern .nav-link:focus {
      color: #ffffff;
      opacity: 1;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: #fff;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      user-select: none;
    }

    .theme-toggle input {
      display: none;
    }

    .theme-toggle .track {
      position: relative;
      width: 68px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7fb6ff, #5a86ee);
      transition: background-color 0.25s ease, background-image 0.25s ease;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      overflow: hidden;
    }

    .theme-toggle .track::before,
    .theme-toggle .track::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .theme-toggle .track::before {
      opacity: 1;
      background:
        radial-gradient(circle at 18% 26%, rgba(255, 255, 255, 0.95) 0 1.5px, transparent 1.6px),
        radial-gradient(circle at 30% 72%, rgba(255, 255, 255, 0.8) 0 1.5px, transparent 1.6px),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.7) 0 1.2px, transparent 1.3px),
        radial-gradient(circle at 88% 55%, rgba(255, 255, 255, 0.7) 0 1.3px, transparent 1.4px),
        linear-gradient(135deg, #2f4262, #212e44);
    }

    .theme-toggle .track::after {
      opacity: 0;
      background:
        radial-gradient(circle at 72% 25%, rgba(255, 255, 255, 0.45) 0 10px, transparent 10.5px),
        linear-gradient(135deg, #8eb8ff, #6f90ff 50%, #5773e0 100%);
    }

    .theme-toggle .knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--toggle-thumb);
      transition: transform 0.28s cubic-bezier(.34, 1.56, .64, 1), background-color 0.25s ease;
      box-shadow: 0 4px 12px rgba(15, 23, 36, 0.35);
    }

    .theme-toggle .knob::before,
    .theme-toggle .knob::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: var(--toggle-crater);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .theme-toggle .knob::before {
      width: 8px;
      height: 8px;
      top: 7px;
      left: 6px;
    }

    .theme-toggle .knob::after {
      width: 5px;
      height: 5px;
      top: 15px;
      left: 15px;
    }

    .theme-toggle input:checked + .track .knob {
      transform: translateX(34px);
    }

    .theme-toggle input:checked + .track::before {
      opacity: 0;
    }

    .theme-toggle input:checked + .track::after {
      opacity: 1;
    }

    .theme-toggle input:checked + .track .knob::before,
    .theme-toggle input:checked + .track .knob::after {
      opacity: 1;
    }

    .card,
    .table-responsive,
    .modal-content,
    .list-group-item,
    .form-control,
    .form-select,
    .btn-outline-primary,
    .table,
    .bg-white,
    .border,
    .card-body,
    .card-header {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text);
    }

    .table {
      --bs-table-bg: var(--mpv-surface);
      --bs-table-color: var(--mpv-text);
      --bs-table-border-color: var(--mpv-border);
      --bs-table-hover-bg: color-mix(in srgb, var(--mpv-surface) 88%, #6f89ff 12%);
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #ffffff 10%);
    }

    a,
    .btn-link,
    .table a {
      color: var(--mpv-link);
    }

    .text-muted {
      color: var(--mpv-muted) !important;
    }

    .row-overdue { background-color: var(--row-overdue); }
    .row-warning { background-color: var(--row-warning); }

    .table td.reminder-due-overdue {
      background-color: var(--row-overdue) !important;
    }

    .table td.reminder-due-warning {
      background-color: var(--row-warning) !important;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-modern mb-4">
  <div class="container d-flex align-items-center gap-3">
    <a class="navbar-brand fw-semibold" href="/">MPV</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/stammdaten/">Stammdaten</a>
      <a class="nav-link" href="/reminders/">Reminder</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>

    <label class="theme-toggle mb-0" for="theme-switch">
      <span>Theme</span>
      <input type="checkbox" id="theme-switch" aria-label="Dark Mode umschalten">
      <span class="track"><span class="knob"></span></span>
    </label>
  </div>
</nav>
<main class="container py-2 pb-4">
  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-switch');
    const key = 'mpv-theme';

    const getInitialTheme = () => {
      const saved = localStorage.getItem(key);
      if (saved === 'dark' || saved === 'light') {
        return saved;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const applyTheme = (theme) => {
      root.setAttribute('data-theme', theme);
      toggle.checked = theme === 'dark';
    };

    applyTheme(getInitialTheme());

    toggle.addEventListener('change', function () {
      const nextTheme = toggle.checked ? 'dark' : 'light';
      applyTheme(nextTheme);
      localStorage.setItem(key, nextTheme);
    });
  })();
</script>
</body>
</html>
