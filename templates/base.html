<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --mpv-bg: #f4f7fb;
      --mpv-text: #111827;
      --mpv-surface: #ffffff;
      --mpv-border: #dbe3ee;
      --mpv-nav-start: #3a66ff;
      --mpv-nav-end: #6a4dff;
      --mpv-link: #3156db;
      --mpv-muted: #5b6472;
      --row-overdue: #f8d7da;
      --row-warning: #fff3cd;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --mpv-bg: #0f1724;
      --mpv-text: #e5ebf7;
      --mpv-surface: #1b2435;
      --mpv-border: #2c3a52;
      --mpv-nav-start: #171f2f;
      --mpv-nav-end: #232f45;
      --mpv-link: #9ab5ff;
      --mpv-muted: #afbdd6;
      --row-overdue: rgba(248, 88, 112, 0.25);
      --row-warning: rgba(255, 201, 87, 0.22);
    }

    body {
      background: var(--mpv-bg);
      color: var(--mpv-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .navbar-modern {
      background: linear-gradient(135deg, var(--mpv-nav-start), var(--mpv-nav-end));
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.25);
    }

    .navbar-modern .nav-link,
    .navbar-modern .navbar-brand {
      color: #ffffff;
      opacity: 0.92;
      transition: opacity 0.2s ease;
    }

    .navbar-modern .nav-link:hover,
    .navbar-modern .navbar-brand:hover,
    .navbar-modern .nav-link:focus {
      color: #ffffff;
      opacity: 1;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-toggle .track {
      position: relative;
      width: 64px;
      height: 32px;
      border-radius: 999px;
      background: #2f343d;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: background-color 0.25s ease;
      display: block;
    }

    .theme-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f6f6f6;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      transition: transform 0.25s ease, background-color 0.25s ease;
    }

    .theme-toggle .icon {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transition: opacity 0.2s ease;
    }

    .theme-toggle .icon svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .theme-toggle .icon-sun {
      color: #1b1f24;
      opacity: 1;
    }

    .theme-toggle .icon-moon {
      color: #ffffff;
      opacity: 0;
    }

    .theme-toggle input:checked + .track {
      background: #f3f3f3;
    }

    .theme-toggle input:checked + .track .thumb {
      transform: translateX(32px);
      background: #000000;
    }

    .theme-toggle input:checked + .track .icon-sun {
      opacity: 0;
    }

    .theme-toggle input:checked + .track .icon-moon {
      opacity: 1;
    }

    .theme-toggle input:focus-visible + .track {
      outline: 2px solid rgba(255, 255, 255, 0.95);
      outline-offset: 2px;
    }

    .card,
    .table-responsive,
    .modal-content,
    .list-group-item,
    .form-control,
    .form-select,
    .btn-outline-primary,
    .table,
    .bg-white,
    .border,
    .card-body,
    .card-header {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text);
    }

    .table {
      --bs-table-bg: var(--mpv-surface);
      --bs-table-color: var(--mpv-text);
      --bs-table-border-color: var(--mpv-border);
      --bs-table-hover-bg: color-mix(in srgb, var(--mpv-surface) 88%, #6f89ff 12%);
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #ffffff 10%);
    }

    a,
    .btn-link,
    .table a {
      color: var(--mpv-link);
    }

    .text-muted {
      color: var(--mpv-muted) !important;
    }

    .row-overdue { background-color: var(--row-overdue); }
    .row-warning { background-color: var(--row-warning); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-modern mb-4">
  <div class="container d-flex align-items-center gap-3">
    <a class="navbar-brand fw-semibold" href="/">MPV</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/stammdaten/">Stammdaten</a>
      <a class="nav-link" href="/reminders/">Reminder</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>

    <label class="theme-toggle mb-0" for="theme-switch">
      <input type="checkbox" id="theme-switch" aria-label="Dark Mode umschalten">
      <span class="track">
        <span class="thumb" aria-hidden="true">
          <span class="icon icon-sun">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="4.8" stroke="currentColor" stroke-width="2.1"/>
              <path d="M12 2.8V5.2M12 18.8V21.2M21.2 12H18.8M5.2 12H2.8M18.55 5.45L16.85 7.15M7.15 16.85L5.45 18.55M18.55 18.55L16.85 16.85M7.15 7.15L5.45 5.45" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="icon icon-moon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15.5 3.8C13.1 5.1 11.5 7.7 11.5 10.7C11.5 15 15 18.5 19.3 18.5C20.1 18.5 20.8 18.4 21.5 18.1C20.2 20.5 17.7 22.1 14.7 22.1C10 22.1 6.2 18.3 6.2 13.6C6.2 9.8 8.7 6.5 12.1 5.1C13.1 4.7 14.3 4.2 15.5 3.8Z" fill="currentColor"/>
            </svg>
          </span>
        </span>
      </span>
    </label>
  </div>
</nav>
<main class="container py-2 pb-4">
  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-switch');
    const key = 'mpv-theme';

    const getInitialTheme = () => {
      const saved = localStorage.getItem(key);
      if (saved === 'dark' || saved === 'light') {
        return saved;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const applyTheme = (theme) => {
      root.setAttribute('data-theme', theme);
      toggle.checked = theme === 'dark';
    };

    applyTheme(getInitialTheme());

    toggle.addEventListener('change', function () {
      const nextTheme = toggle.checked ? 'dark' : 'light';
      applyTheme(nextTheme);
      localStorage.setItem(key, nextTheme);
    });
  })();
</script>
</body>
</html>
