<!doctype html>
<html lang="de">
<head>
  <script>
    (function() {
      var savedTheme = localStorage.getItem('mpv-theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      color-scheme: light;
      /* Salbeigrün-Touch - Light Mode Backgrounds */
      --mpv-bg: #f2f5f3;
      --mpv-text: #2c3e32;
      --mpv-surface: #ffffff;
      --mpv-border: #c8d6ce;
      
      /* Grüne Navbar - Light Mode */
      --mpv-nav-start: #7a9e87;
      --mpv-nav-end: #5c8069;
      
      --mpv-link: #4a7c59;
      --mpv-muted: #6b7d72;
      --mpv-highlight: #7a9e87; /* Für Hover-Mixes */
      
      /* Status Rows - Light */
      --row-overdue: #fbe6e8;
      --row-warning: #fdf5d3;

      /* Button Base Colors - Light (Harmonisch abgestimmt) */
      --btn-edit: #d98a4c;   /* Orange */
      --btn-delete: #c95c5c; /* Rot */
      --btn-add: #6b9e78;    /* Grün */
      --btn-save: #5c85a6;   /* Blau */
      --btn-cancel: #8c9690; /* Grau */
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      /* Grau-Schwarz - Dark Mode Backgrounds (Neutral) */
      --mpv-bg: #121212;
      --mpv-text: #e0e0e0;
      --mpv-surface: #1e1e1e;
      --mpv-border: #333333;
      
      /* Dunkelgrüne Navbar - Dark Mode (Abgestuft) */
      --mpv-nav-start: #3a4f42;
      --mpv-nav-end: #25332a;
      
      --mpv-muted: #9e9e9e;
      
      /* Salbeigrüne Akzente bleiben für Links und Hover */
      --mpv-link: #8ebfa0;
      --mpv-highlight: #4a7c59; 
      
      /* Status Rows - Dark */
      --row-overdue: rgba(201, 92, 92, 0.25);
      --row-warning: rgba(217, 180, 76, 0.22);

      /* Button Base Colors - Dark (Gedämpfter für Dark Mode) */
      --btn-edit: #bd7339;
      --btn-delete: #ab4949;
      --btn-add: #578563;
      --btn-save: #4a6f8c;
      --btn-cancel: #737c76;
    }

    body {
      background: var(--mpv-bg);
      color: var(--mpv-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    /* --- Navbar --- */
    .navbar-modern {
      background: linear-gradient(135deg, var(--mpv-nav-start), var(--mpv-nav-end));
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .navbar-modern .nav-link,
    .navbar-modern .navbar-brand {
      color: #ffffff;
      opacity: 0.92;
      transition: opacity 0.2s ease;
    }

    .navbar-modern .nav-link:hover,
    .navbar-modern .navbar-brand:hover,
    .navbar-modern .nav-link:focus {
      color: #ffffff;
      opacity: 1;
    }

    /* --- Theme Toggle --- */
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      user-select: none;
    }

    .theme-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .theme-toggle .track {
      position: relative;
      width: 64px;
      height: 32px;
      border-radius: 999px;
      background: #2f3b33;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: background-color 0.25s ease;
      display: block;
    }
    
    html[data-theme="dark"] .theme-toggle .track {
      background: #333333; /* Neutrales Grau für den Toggle im Dark Mode */
    }

    .theme-toggle .thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f6f8f7;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.22);
      transition: transform 0.25s ease, background-color 0.25s ease;
    }

    .theme-toggle .icon {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transition: opacity 0.2s ease;
    }

    .theme-toggle .icon svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .theme-toggle .icon-sun {
      color: #1b261f;
      opacity: 1;
    }

    .theme-toggle .icon-moon {
      color: #ffffff;
      opacity: 0;
    }

    .theme-toggle input:checked + .track {
      background: #e0e0e0;
    }

    .theme-toggle input:checked + .track .thumb {
      transform: translateX(32px);
      background: #121212;
    }

    .theme-toggle input:checked + .track .icon-sun {
      opacity: 0;
    }

    .theme-toggle input:checked + .track .icon-moon {
      opacity: 1;
    }

    .theme-toggle input:focus-visible + .track {
      outline: 2px solid rgba(255, 255, 255, 0.95);
      outline-offset: 2px;
    }

    /* --- Base Elements & Overrides --- */
    .card,
    .table-responsive,
    .modal-content,
    .list-group-item,
    .btn-outline-primary,
    .table,
    .bg-white,
    .border,
    .card-body,
    .card-header {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text);
    }

    /* --- Spezifische Formular-Styles (Inputs, Selects) --- */
    .form-control,
    .form-select {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text) !important; /* !important erzwingt die helle Schrift im Dark Mode */
    }

    /* Das passiert, wenn du in das Feld klickst (Fokus) */
    .form-control:focus,
    .form-select:focus {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-link) !important; /* Grüne Umrandung beim Reinklicken */
      color: var(--mpv-text) !important; /* Text bleibt hell! */
      box-shadow: 0 0 0 0.25rem color-mix(in srgb, var(--mpv-link) 25%, transparent) !important;
    }

    a,
    .btn-link,
    .table a {
      color: var(--mpv-link);
    }

    .text-muted {
      color: var(--mpv-muted) !important;
    }

    /* --- Tables --- */
    .table {
      --bs-table-bg: var(--mpv-surface);
      --bs-table-color: var(--mpv-text);
      --bs-table-border-color: var(--mpv-border);
      --bs-table-hover-bg: color-mix(in srgb, var(--mpv-surface) 88%, var(--mpv-highlight) 12%);
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #000000 3%);
    }
    
    html[data-theme="dark"] .table {
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #ffffff 3%);
    }

    /* --- Cards & Forms --- */
    .card {
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .card-header {
      border-bottom: 1px solid var(--mpv-border) !important;
    }

    .list-group-item {
      padding-top: 0.9rem;
      padding-bottom: 0.9rem;
    }

    .form-label {
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .form-control::placeholder {
      color: var(--mpv-muted);
      opacity: 1;
    }

    /* --- Accordion --- */
    .accordion,
    .accordion-item,
    .accordion-header,
    .accordion-body,
    .accordion-button {
      background-color: var(--mpv-surface);
      border-color: var(--mpv-border);
      color: var(--mpv-text);
    }

    .accordion-button:not(.collapsed) {
      color: var(--mpv-text);
      background-color: color-mix(in srgb, var(--mpv-surface) 88%, var(--mpv-highlight) 12%);
    }

    .accordion-button:focus {
      box-shadow: 0 0 0 0.2rem color-mix(in srgb, var(--mpv-link) 40%, transparent);
      border-color: var(--mpv-border);
    }

    .accordion-button::after {
      filter: brightness(0.7);
    }

    html[data-theme="dark"] .accordion-button::after {
      filter: invert(1) brightness(1.4);
    }

    /* --- Custom Buttons --- */
    .btn {
      border-radius: 0.65rem;
      transition: background-color 0.2s ease, transform 0.1s ease;
      color: #ffffff; /* Text auf Buttons immer weiß für guten Kontrast */
      border: none;
    }
    
    .btn:hover {
      color: #ffffff;
      transform: translateY(-1px);
    }

    .btn-edit { background-color: var(--btn-edit); }
    .btn-edit:hover { background-color: color-mix(in srgb, var(--btn-edit) 85%, #000 15%); }

    .btn-delete { background-color: var(--btn-delete); }
    .btn-delete:hover { background-color: color-mix(in srgb, var(--btn-delete) 85%, #000 15%); }

    .btn-add { background-color: var(--btn-add); }
    .btn-add:hover { background-color: color-mix(in srgb, var(--btn-add) 85%, #000 15%); }

    .btn-save { background-color: var(--btn-save); }
    .btn-save:hover { background-color: color-mix(in srgb, var(--btn-save) 85%, #000 15%); }

    .btn-cancel { background-color: var(--btn-cancel); }
    .btn-cancel:hover { background-color: color-mix(in srgb, var(--btn-cancel) 85%, #000 15%); }

    /* --- Pagination --- */
    .pagination {
      --bs-pagination-bg: var(--mpv-surface);
      --bs-pagination-border-color: var(--mpv-border);
      --bs-pagination-color: var(--mpv-link);
      --bs-pagination-hover-color: var(--mpv-text);
      --bs-pagination-hover-bg: color-mix(in srgb, var(--mpv-surface) 86%, var(--mpv-highlight) 14%);
      --bs-pagination-hover-border-color: var(--mpv-border);
      --bs-pagination-active-color: #ffffff;
      --bs-pagination-active-bg: var(--mpv-link);
      --bs-pagination-active-border-color: var(--mpv-link);
      --bs-pagination-disabled-color: color-mix(in srgb, var(--mpv-muted) 85%, transparent);
      --bs-pagination-disabled-bg: color-mix(in srgb, var(--mpv-surface) 94%, var(--mpv-border) 6%);
      --bs-pagination-disabled-border-color: var(--mpv-border);
      --bs-pagination-focus-color: var(--mpv-text);
      --bs-pagination-focus-bg: color-mix(in srgb, var(--mpv-surface) 84%, var(--mpv-highlight) 16%);
      --bs-pagination-focus-box-shadow: 0 0 0 0.2rem color-mix(in srgb, var(--mpv-link) 38%, transparent);
    }

    .pagination .page-link {
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    /* --- Status Rows --- */
    .row-overdue { background-color: var(--row-overdue); }
    .row-warning { background-color: var(--row-warning); }

    .table td.reminder-due-overdue {
      background-color: var(--row-overdue) !important;
    }

    .table td.reminder-due-warning {
      background-color: var(--row-warning) !important;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-modern mb-4 shadow-sm">
  <div class="container">
    
    <a class="navbar-brand fw-bold" href="/">MPV</a>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Navigation umschalten">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      
      <div class="navbar-nav mx-auto mb-2 mb-lg-0 gap-2">
        <a class="nav-link d-flex align-items-center gap-2 rounded px-3 transition-all" href="/">
          <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a class="nav-link d-flex align-items-center gap-2 rounded px-3 transition-all" href="/stammdaten/">
          <i class="fa-solid fa-database"></i> Stammdaten
        </a>
        <a class="nav-link d-flex align-items-center gap-2 rounded px-3 transition-all" href="/dokumente/">
          <i class="fa-regular fa-file-lines"></i> Dokumente
        </a>
        <a class="nav-link d-flex align-items-center gap-2 rounded px-3 transition-all" href="/reminders/">
          <i class="fa-regular fa-bell"></i> Reminder
        </a>
        <a class="nav-link d-flex align-items-center gap-2 rounded px-3 transition-all" href="/admin/">
          <i class="fa-solid fa-gear"></i> Admin
        </a>
      </div>

      <div class="d-flex align-items-center ms-lg-auto mt-3 mt-lg-0 ps-lg-3 border-start-lg">
        <label class="theme-toggle mb-0 cursor-pointer" for="theme-switch">
          <input type="checkbox" id="theme-switch" aria-label="Dark Mode umschalten" class="d-none">
          <span class="track position-relative d-inline-block">
            <span class="thumb" aria-hidden="true">
              <span class="icon icon-sun">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="12" r="4.8" stroke="currentColor" stroke-width="2.1"/>
                  <path d="M12 2.8V5.2M12 18.8V21.2M21.2 12H18.8M5.2 12H2.8M18.55 5.45L16.85 7.15M7.15 16.85L5.45 18.55M18.55 18.55L16.85 16.85M7.15 7.15L5.45 5.45" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="icon icon-moon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M15.5 3.8C13.1 5.1 11.5 7.7 11.5 10.7C11.5 15 15 18.5 19.3 18.5C20.1 18.5 20.8 18.4 21.5 18.1C20.2 20.5 17.7 22.1 14.7 22.1C10 22.1 6.2 18.3 6.2 13.6C6.2 9.8 8.7 6.5 12.1 5.1C13.1 4.7 14.3 4.2 15.5 3.8Z" fill="currentColor"/>
                </svg>
              </span>
            </span>
          </span>
        </label>
      </div>

    </div>
  </div>
</nav>
<main class="container py-2 pb-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-switch');
    const key = 'mpv-theme';

    // Toggle Checkbox Zustand setzen basierend auf dem Wert, 
    // der bereits vom Skript im <head> festgelegt wurde.
    toggle.checked = root.getAttribute('data-theme') === 'dark';

    // Event Listener für den Klick auf den Schalter
    toggle.addEventListener('change', function () {
      const nextTheme = toggle.checked ? 'dark' : 'light';
      root.setAttribute('data-theme', nextTheme);
      localStorage.setItem(key, nextTheme);
    });
  })();
</script>
</body>
</html>
