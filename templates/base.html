<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --mpv-bg: #f4f7fb;
      --mpv-text: #111827;
      --mpv-surface: #ffffff;
      --mpv-border: #dbe3ee;
      --mpv-nav-start: #3a66ff;
      --mpv-nav-end: #6a4dff;
      --mpv-link: #3156db;
      --mpv-muted: #5b6472;
      --row-overdue: #f8d7da;
      --row-warning: #fff3cd;
      --toggle-crater: #d2d9ea;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --mpv-bg: #0f1724;
      --mpv-text: #e5ebf7;
      --mpv-surface: #1b2435;
      --mpv-border: #2c3a52;
      --mpv-nav-start: #171f2f;
      --mpv-nav-end: #232f45;
      --mpv-link: #9ab5ff;
      --mpv-muted: #afbdd6;
      --row-overdue: rgba(248, 88, 112, 0.25);
      --row-warning: rgba(255, 201, 87, 0.22);
      --toggle-crater: #dbe4ff;
    }

    body {
      background: var(--mpv-bg);
      color: var(--mpv-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .navbar-modern {
      background: linear-gradient(135deg, var(--mpv-nav-start), var(--mpv-nav-end));
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.25);
    }

    .navbar-modern .nav-link,
    .navbar-modern .navbar-brand {
      color: #ffffff;
      opacity: 0.92;
      transition: opacity 0.2s ease;
    }

    .navbar-modern .nav-link:hover,
    .navbar-modern .navbar-brand:hover,
    .navbar-modern .nav-link:focus {
      color: #ffffff;
      opacity: 1;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      user-select: none;
    }

    .theme-toggle input {
      display: none;
    }

    .theme-toggle .track {
      position: relative;
      width: 56px;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7fb6ff, #5a86ee);
      transition: background-color 0.25s ease, background-image 0.25s ease;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      overflow: hidden;
    }

    .theme-toggle .track::before,
    .theme-toggle .track::after {
      content: "";
      position: absolute;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .theme-toggle .track::before {
      width: 10px;
      height: 10px;
      top: 6px;
      right: 8px;
      border-radius: 50%;
      background: #ffe27a;
      box-shadow:
        0 0 0 5px rgba(255, 226, 122, 0.2),
        0 0 10px rgba(255, 226, 122, 0.75);
      opacity: 1;
    }

    .theme-toggle .track::after {
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      background:
        radial-gradient(circle at 22% 35%, rgba(255, 255, 255, 0.85) 0 1.2px, transparent 1.3px),
        radial-gradient(circle at 36% 62%, rgba(255, 255, 255, 0.75) 0 1.2px, transparent 1.3px),
        radial-gradient(circle at 79% 34%, rgba(255, 255, 255, 0.7) 0 1.1px, transparent 1.2px),
        linear-gradient(135deg, #233147, #182235);
    }

    .theme-toggle .knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffd85f;
      transition: transform 0.28s cubic-bezier(.34, 1.56, .64, 1), background-color 0.25s ease, box-shadow 0.25s ease;
      box-shadow:
        0 0 0 2px rgba(255, 216, 95, 0.35),
        0 4px 10px rgba(15, 23, 36, 0.3);
    }

    .theme-toggle .knob::before,
    .theme-toggle .knob::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: var(--toggle-crater);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .theme-toggle .knob::before {
      width: 7px;
      height: 7px;
      top: 6px;
      left: 5px;
    }

    .theme-toggle .knob::after {
      width: 4px;
      height: 4px;
      top: 14px;
      left: 13px;
    }

    .theme-toggle input:checked + .track {
      background: #233147;
    }

    .theme-toggle input:checked + .track .knob {
      transform: translateX(26px);
      background: #f4f6ff;
      box-shadow: 0 4px 10px rgba(15, 23, 36, 0.38);
    }

    .theme-toggle input:checked + .track::before {
      opacity: 0;
    }

    .theme-toggle input:checked + .track::after {
      opacity: 1;
    }

    .theme-toggle input:checked + .track .knob::before,
    .theme-toggle input:checked + .track .knob::after {
      opacity: 1;
    }

    .card,
    .table-responsive,
    .modal-content,
    .list-group-item,
    .form-control,
    .form-select,
    .btn-outline-primary,
    .table,
    .bg-white,
    .border,
    .card-body,
    .card-header {
      background-color: var(--mpv-surface) !important;
      border-color: var(--mpv-border) !important;
      color: var(--mpv-text);
    }

    .table {
      --bs-table-bg: var(--mpv-surface);
      --bs-table-color: var(--mpv-text);
      --bs-table-border-color: var(--mpv-border);
      --bs-table-hover-bg: color-mix(in srgb, var(--mpv-surface) 88%, #6f89ff 12%);
      --bs-table-striped-bg: color-mix(in srgb, var(--mpv-surface) 90%, #ffffff 10%);
    }

    a,
    .btn-link,
    .table a {
      color: var(--mpv-link);
    }

    .text-muted {
      color: var(--mpv-muted) !important;
    }

    .row-overdue { background-color: var(--row-overdue); }
    .row-warning { background-color: var(--row-warning); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-modern mb-4">
  <div class="container d-flex align-items-center gap-3">
    <a class="navbar-brand fw-semibold" href="/">MPV</a>
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/stammdaten/">Stammdaten</a>
      <a class="nav-link" href="/reminders/">Reminder</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>

    <label class="theme-toggle mb-0" for="theme-switch">
      <input type="checkbox" id="theme-switch" aria-label="Dark Mode umschalten">
      <span class="track"><span class="knob"></span></span>
    </label>
  </div>
</nav>
<main class="container py-2 pb-4">
  {% block content %}{% endblock %}
</main>

<script>
  (function () {
    const root = document.documentElement;
    const toggle = document.getElementById('theme-switch');
    const key = 'mpv-theme';

    const getInitialTheme = () => {
      const saved = localStorage.getItem(key);
      if (saved === 'dark' || saved === 'light') {
        return saved;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const applyTheme = (theme) => {
      root.setAttribute('data-theme', theme);
      toggle.checked = theme === 'dark';
    };

    applyTheme(getInitialTheme());

    toggle.addEventListener('change', function () {
      const nextTheme = toggle.checked ? 'dark' : 'light';
      applyTheme(nextTheme);
      localStorage.setItem(key, nextTheme);
    });
  })();
</script>
</body>
</html>
